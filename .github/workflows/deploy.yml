name: Deploy Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches your AWS Lambda runtime

      - name: Install Dependencies
        run: npm ci

      - name: Build TypeScript to .mjs
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change to your specific region

      - name: Zip the built file
        run: zip -j deploy.zip dist/index.mjs

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name YourLambdaFunctionNameHere \
            --zip-file fileb://deploy.zip